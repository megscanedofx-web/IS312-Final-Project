{% extends 'partials/base.html' %}
{% block body %}
<div class="dashboard-layout">
  {% include 'partials/sidebar.html' %}
  <div class="main-content">
    <div class="topbar">
      <div class="flex items-center gap-3">
        <button class="sidebar-toggle"><i class="fas fa-bars"></i></button>
        <h1>{% block page_title %}Dashboard{% endblock %}</h1>
      </div>
      <div class="topbar .search-box" style="display:flex;align-items:center;gap:0.5rem;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:9999px;padding:0.375rem 1rem;">
        <i class="fas fa-search" style="color:var(--gray-400);font-size:0.85rem;"></i>
        <input type="text" placeholder="Search..." style="border:none;background:none;font-size:0.875rem;color:var(--gray-700);outline:none;width:200px;">
      </div>
      <div class="user-info">
        <span>{{ session.get('name', 'User') }}</span>
        <div class="avatar">{{ session.get('name', 'U')[0] }}</div>
      </div>
    </div>
    <div class="page-content fade-in">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
