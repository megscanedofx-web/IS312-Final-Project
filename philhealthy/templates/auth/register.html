{% extends 'partials/base.html' %}
{% block title %}Register - PhilHealthy{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <a href="{{ url_for('homepage') }}" class="navbar-brand" style="justify-content:center;margin-bottom:0.5rem;display:flex;"><i class="fas fa-pills"></i> Phil<span>Healthy</span></a>
    </div>
    <h2>Create Account</h2>
    <p class="subtitle">Join PhilHealthy to get started</p>
    <form method="POST">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" class="form-control" placeholder="Juan Dela Cruz" required></div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" class="form-control" placeholder="you@email.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6"></div>
      <div class="form-group"><label>Role</label>
        <select name="role" class="form-control">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account <i class="fas fa-user-plus"></i></button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('role_select') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
